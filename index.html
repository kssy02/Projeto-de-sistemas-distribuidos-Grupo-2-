<!DOCTYPE html>
<html>
<head>
    <title>Reservas de Salas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; }
        h1 { color: #1a237e; }
        .controles { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .controles input, .controles button { padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        .controles button { background: #1a237e; color: white; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a237e; color: white; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        .status-livre { background: #c8e6c9; color: #1b5e20; padding: 4px 12px; border-radius: 12px; }
        .status-ocupada { background: #ffcdd2; color: #b71c1c; padding: 4px 12px; border-radius: 12px; }
        .btn-reservar { background: #2e7d32; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-cancelar { background: #c62828; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .reservas-lista { margin-top: 20px; }
        .reservas-lista li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; list-style: none; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #323232; color: white; padding: 16px 24px; border-radius: 8px; display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1> Reservas de Salas</h1>
    
    <div class="controles">
        <label>Data:</label>
        <input type="text" id="data" placeholder="dd/mm/aaaa" maxlength="10">
        <button onclick="carregarSalas()">🔍 Verificar</button>
    </div>

    <div id="grade"></div>

    <div class="reservas-lista">
        <h2>📌 Reservas</h2>
        <div id="reservas"></div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const API = 'http://localhost:3000';

    function mostrarToast(msg, cor) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.background = cor || '#323232';
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    async function carregarSalas() {
        const data = document.getElementById('data').value;
        try {
            const res = await fetch(`${API}/check?data=${data}`);
            const dados = await res.json();
            let html = '<table><tr><th>Sala</th><th>Status</th><th>Ação</th></tr>';
            dados.salas.forEach(sala => {
                const cor = sala.status === 'LIVRE' ? 'status-livre' : 'status-ocupada';
                const acao = sala.status === 'LIVRE' 
                    ? `<button class="btn-reservar" onclick="reservar('${sala.sala}')">Reservar</button>` 
                    : `<span class="status-ocupada">Ocupada</span>`;
                html += `<tr><td>${sala.sala}</td><td><span class="${cor}">${sala.status}</span></td><td>${acao}</td></tr>`;
            });
            html += '</table>';
            document.getElementById('grade').innerHTML = html;
            await carregarReservas();
        } catch (e) {
            mostrarToast('❌ Servidor não está rodando', '#c62828');
        }
    }

    async function carregarReservas() {
        try {
            const res = await fetch(`${API}/reservas`);
            const dados = await res.json();
            if (dados.length === 0) {
                document.getElementById('reservas').innerHTML = '<p>Nenhuma reserva.</p>';
                return;
            }
            let html = '<ul>';
            dados.forEach(r => {
                html += `<li><span>${r.sala} - ${r.hora} - ${r.cliente}</span>
                    <button class="btn-cancelar" onclick="cancelar('${r.id}')">Cancelar</button></li>`;
            });
            html += '</ul>';
            document.getElementById('reservas').innerHTML = html;
        } catch (e) {}
    }

    async function reservar(sala) {
        const hora = prompt('Horário (ex: 14:00)');
        if (!hora) return;
        const cliente = prompt('Seu nome');
        if (!cliente) return;
        try {
            const res = await fetch(`${API}/reserve`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sala, hora, cliente })
            });
            if (res.ok) {
                mostrarToast('✅ Reserva confirmada!', '#2e7d32');
                carregarSalas();
            } else {
                const erro = await res.json();
                mostrarToast('❌ ' + erro.erro, '#c62828');
            }
        } catch (e) {
            mostrarToast('❌ Erro', '#c62828');
        }
    }

    async function cancelar(id) {
        if (!confirm('Cancelar?')) return;
        await fetch(`${API}/cancel/${id}`, { method: 'DELETE' });
        mostrarToast('✅ Cancelada', '#2e7d32');
        carregarSalas();
    }

    setInterval(carregarSalas, 15000);
    carregarSalas();
</script>
</body>
</html>
